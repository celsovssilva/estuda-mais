<div class="dashboard-container">

    <header class="dashboard-header">
        <h1>🎓 EstudaMais - Meu Painel</h1>
        <button class="btn-logout" (click)="onLogout()">Sair</button>
    </header>

    <div class="dashboard-grid">

        <section class="card checklist-section">
            <h2>📌 Minhas Tarefas (Checklist)</h2>

            <form class="checklist-form" (ngSubmit)="addTask()">
                <input type="text" [(ngModel)]="newTask.description" name="desc" placeholder="Nova tarefa..." required>
                <input type="date" [(ngModel)]="newTask.executionDate" name="date" required>
                <button type="submit" style="background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">+</button>
            </form>

            <ul class="task-list">
                <li *ngFor="let task of tasks" class="task-item">
                    <div class="task-info">
                        <input type="checkbox" [checked]="task.completed" (change)="toggleTask(task)">
                        <span [class.completed]="task.completed">
              {{ task.description }} <br>
              <small style="color: #999;">{{ task.executionDate }}</small>
            </span>
                    </div>
                    <button class="btn-delete" (click)="deleteTask(task.id)">🗑️</button>
                </li>
            </ul>
            <p *ngIf="tasks.length === 0" style="text-align: center; color: #999;">Nenhuma tarefa pendente.</p>
        </section>

        <section class="card">
            <h2>📝 Notas Rápidas</h2>
            <p style="color: #666; font-style: italic;">Funcionalidade em desenvolvimento...</p>
        </section>

        <section class="card">
            <h2>📅 Cronograma</h2>
            <p style="color: #666; font-style: italic;">Funcionalidade em desenvolvimento...</p>
        </section>

    </div>
</div>
