<div class="auth-wrapper">
    <div class="register-container">
        <h2>Criar Conta no EstudaMais</h2>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>

            <div class="form-group">
                <label for="name">Nome Completo</label>
                <input id="name" type="text" formControlName="name" placeholder="Digite seu nome" />
                <small *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid" class="error-text">
                    O nome precisa ter pelo menos 3 caracteres.
                </small>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" type="email" formControlName="email" placeholder="Digite seu e-mail" />
                <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" class="error-text">
                    Insira um e-mail válido.
                </small>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input id="password" type="password" formControlName="password" placeholder="Crie uma senha" />
                <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" class="error-text">
                    A senha precisa ter pelo menos 6 caracteres.
                </small>
            </div>

            <button type="submit" [disabled]="isLoading" class="btn-submit">
                {{ isLoading ? 'Cadastrando...' : 'Cadastrar' }}
            </button>
        </form>

        <p class="redirect-text">
            Já tem uma conta? <a routerLink="/login">Faça login</a>
        </p>
    </div>
</div>
